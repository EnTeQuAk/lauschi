name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format · Analyze · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (Riverpod + Drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/ test/

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Create .env.app for tests
        run: |
          cat > .env.app << EOF
          ENABLE_SPOTIFY=false
          SPOTIFY_CLIENT_ID=
          ENABLE_APPLE_MUSIC=true
          ENABLE_SENTRY=false
          SENTRY_DSN=
          SENTRY_ENVIRONMENT=ci
          EOF

      - name: Run tests
        run: flutter test --dart-define-from-file=.env.app

      - name: Build APK (verify compilation)
        if: github.event_name == 'pull_request'
        env:
          # Read by gradle: injected into AndroidManifest for on-device JWT.
          APPLE_MUSIC_KEY: ${{ secrets.APPLE_MUSIC_KEY }}
        run: flutter build apk --debug --dart-define-from-file=.env.app
