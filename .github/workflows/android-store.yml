name: Android Store Release

on:
  release:
    types: [published]

concurrency:
  group: android-store-${{ github.ref }}
  cancel-in-progress: true

jobs:
  store-release:
    name: Build · Sign · Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create .env.app
        run: |
          cat > .env.app << EOF
          ENABLE_SPOTIFY=false
          SPOTIFY_CLIENT_ID=unused
          ENABLE_SENTRY=false
          SENTRY_DSN=unused
          SENTRY_ENVIRONMENT=production
          EOF

      - name: Set up signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          cat > android/key.properties << 'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build release AAB
        run: |
          VERSION_NAME=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          flutter build appbundle --release \
            --build-name="$VERSION_NAME" \
            --build-number=${{ github.run_number }} \
            --dart-define-from-file=.env.app

      - name: Upload to Google Play (open testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.lauschi.lauschi
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: beta
          status: completed
          releaseName: ${{ github.event.release.tag_name }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-store-${{ github.event.release.tag_name }}
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Clean up signing
        if: always()
        run: rm -f android/app/keystore.jks android/key.properties
