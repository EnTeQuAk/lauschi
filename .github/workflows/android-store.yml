name: Android Store Release

on:
  release:
    types: [published]

concurrency:
  group: android-store-${{ github.ref }}
  cancel-in-progress: false

jobs:
  store-release:
    name: Build · Sign · Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Read Flutter version from mise.toml
        id: flutter-version
        run: echo "version=$(grep -m1 '^flutter =' mise.toml | sed 's/.*= *"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create .env.app
        run: |
          cat > .env.app << EOF
          # Spotify disabled: their ToS requires 25k MAU for quota raise,
          # which we don't have yet. Apple Music has no such restriction.
          ENABLE_SPOTIFY=false
          SPOTIFY_CLIENT_ID=unused
          ENABLE_APPLE_MUSIC=true
          ENABLE_SENTRY=true
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT=testing
          EOF

      - name: Set up signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          cat > android/key.properties << 'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build release AAB
        env:
          # Read by gradle: injected into AndroidManifest for on-device JWT.
          APPLE_MUSIC_KEY: ${{ secrets.APPLE_MUSIC_KEY }}
        run: |
          VERSION_NAME=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          # Offset by 10 to avoid conflict with manually uploaded version code 1
          BUILD_NUMBER=$(( ${{ github.run_number }} + 10 ))
          flutter build appbundle --release \
            --build-name="$VERSION_NAME" \
            --build-number="$BUILD_NUMBER" \
            --dart-define-from-file=.env.app

      - name: Upload to Google Play (open testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.lauschi.lauschi
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: beta
          status: completed
          releaseName: ${{ github.event.release.tag_name }}
          whatsNewDirectory: distribution/whatsnew

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-store-${{ github.event.release.tag_name }}
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Clean up signing
        if: always()
        run: rm -f android/app/keystore.jks android/key.properties
