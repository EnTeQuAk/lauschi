name: Android Store Release (Spotify)

# Uploads a Spotify-enabled build to the custom closed testing track.
# Triggered alongside the main store release on GitHub Release.

on:
  release:
    types: [published]

# Same concurrency group as the main store workflow. Google Play
# only allows one active edit per package. Parallel uploads from
# different tracks invalidate each other's edits.
concurrency:
  group: android-store-${{ github.ref }}
  cancel-in-progress: false

jobs:
  store-release-spotify:
    name: Build · Sign · Play Store (Spotify)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create .env.app
        run: |
          cat > .env.app << EOF
          ENABLE_SPOTIFY=true
          SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}
          ENABLE_APPLE_MUSIC=true
          ENABLE_SENTRY=true
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT=testing
          EOF

      - name: Set up signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          cat > android/key.properties << 'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build release AAB
        env:
          # Read by gradle: injected into AndroidManifest for on-device JWT.
          APPLE_MUSIC_KEY: ${{ secrets.APPLE_MUSIC_KEY }}
        run: |
          VERSION_NAME=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          # Offset +100 to avoid collision with main store track (+10)
          BUILD_NUMBER=$(( ${{ github.run_number }} + 100 ))
          flutter build appbundle --release \
            --build-name="$VERSION_NAME" \
            --build-number="$BUILD_NUMBER" \
            --dart-define-from-file=.env.app

      - name: Upload to Google Play (Spotify closed testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.lauschi.lauschi
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: "Closed testing - Alpha Spotify"
          status: completed
          releaseName: "${{ github.event.release.tag_name }}-spotify"
          whatsNewDirectory: distribution/whatsnew

      - name: Clean up signing
        if: always()
        run: rm -f android/app/keystore.jks android/key.properties
