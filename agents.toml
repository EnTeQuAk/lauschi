version = 1
# Skills are checked into git so collaborators get them without running
# 'dotagents install'. Skills live in .agents/skills/ and are symlinked
# to .claude/skills/ for Claude Code compatibility.
gitignore = false
agents = ["claude"]

# dotagents self-reference (CLI guidance for agents)
[[skills]]
name = "dotagents"
source = "getsentry/dotagents"

# Sentry skills (from getsentry/dotagents)
[[skills]]
name = "sentry-create-alert"
source = "path:.agents/skills/sentry-create-alert"

[[skills]]
name = "sentry-fix-issues"
source = "path:.agents/skills/sentry-fix-issues"

[[skills]]
name = "sentry-pr-code-review"
source = "path:.agents/skills/sentry-pr-code-review"

# Lauschi-specific skills
[[skills]]
name = "update-changelog"
source = "path:.agents/skills/update-changelog"
