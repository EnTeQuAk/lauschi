{% extends "base.html" %}
{% block title %}Jobs — lauschi{% endblock %}
{% block content %}
    <div x-data="jobsPage()" x-init="init()">
        <header class="flex items-baseline justify-between gap-1 wrap mb-15">
            <div>
                <h1 class="mb-025">Jobs</h1>
                <p class="text-muted mb-0">
                    <span x-text="jobs.length"></span> recent jobs
                    <span x-show="polling" class="text-muted" x-cloak> · auto-refreshing</span>
                </p>
            </div>
        </header>
        <template x-if="jobs.length > 0">
            <table role="grid">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Series</th>
                        <th>Command</th>
                        <th>Status</th>
                        <th>Logs</th>
                        <th>Created</th>
                        <th class="w-7rem">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="j in jobs" :key="j.id">
                        <tr>
                            <td>
                                <a :href="'/jobs/' + j.id"><code x-text="j.id"></code></a>
                            </td>
                            <td>
                                <a :href="'/catalog/' + j.series_id" x-text="j.series_id"></a>
                            </td>
                            <td x-text="j.command"></td>
                            <td>
                                <span class="status-badge"
                                      :class="'status-badge--' + j.status"
                                      x-text="j.status"></span>
                            </td>
                            <td><span x-text="j.log_count"></span> lines</td>
                            <td class="text-muted" x-text="j.created_at.substring(0, 19)"></td>
                            <td>
                                <button class="secondary outline btn-sm"
                                        @click="openJobDrawer(j.id)">View logs</button>
                                <template x-if="j.status === 'running' || j.status === 'queued'">
                                    <form method="post"
                                          :action="'/api/jobs/' + j.id + '/cancel'"
                                          class="form-inline">
                                        <button type="submit" class="outline btn-sm">Cancel</button>
                                    </form>
                                </template>
                                <template x-if="j.status === 'error' || j.status === 'cancelled'">
                                    <form method="post" action="/api/jobs" class="form-inline">
                                        <input type="hidden" name="series_id" :value="j.series_id" />
                                        <input type="hidden" name="command" :value="j.command" />
                                        <button type="submit" class="contrast btn-sm">Retry</button>
                                    </form>
                                </template>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </template>
        <p x-show="jobs.length === 0" class="text-muted text-center mt-3">No jobs yet.</p>
    </div>
{% endblock %}
{% block scripts %}
    <script>
function jobsPage() {
    return {
        jobs: {{ jobs_json | safe }},
        polling: false,
        _timer: null,

        init() {
            this.polling = this.hasActive();
            if (this.polling) this.startPolling();
        },

        hasActive() {
            return this.jobs.some(j => j.status === 'running' || j.status === 'queued');
        },

        startPolling() {
            if (this._timer) return;
            this._timer = setInterval(() => this.refresh(), 5000);
        },

        stopPolling() {
            if (this._timer) {
                clearInterval(this._timer);
                this._timer = null;
            }
            this.polling = false;
        },

        async refresh() {
            try {
                const res = await fetch('/api/jobs');
                this.jobs = await res.json();
                if (!this.hasActive()) this.stopPolling();
            } catch (_) {}
        },

        async openJobDrawer(jobId) {
            const store = Alpine.store('jobs');
            if (!store) return;
            store.open = true;
            store.lines = [];
            store.active = 0;
            store.currentJobId = jobId;
            if (window._loadedHistory) window._loadedHistory.delete(jobId);
            await connectJobStream(jobId);
        }
    };
}
    </script>
{% endblock %}
