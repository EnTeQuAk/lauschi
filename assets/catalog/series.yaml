# DACH Hörspiel series catalog
# Used by CatalogService to match Spotify album names AND artist IDs returned
# by the parent's search, and suggest group assignments in AddCardScreen.
#
# Fields:
#   id                  unique snake_case (stable — stored in DB)
#   title               canonical German series title
#   aliases             alternative titles Spotify may use
#   keywords            words that must appear in the Spotify album name.
#                       Omit if matching by artist ID only.
#   spotify_artist_ids  Spotify artist IDs whose albums belong to this series.
#                       Artist-ID matching fires AFTER keyword matching and
#                       catches albums whose titles omit the series name entirely
#                       (e.g. TKKG "140/Draculas Erben", Die drei ??? "116/Cobra").
#   episode_pattern     regex (one capture group) extracting the episode number.
#                       Omit for standalone (non-numbered) series.
#
# Validated against live Spotify data via scripts/validate_catalog.py.
# Run `mise run catalog-check` (cached) or `mise run catalog-check-fresh`.
# Run `mise run catalog-audit` for full L5 discography check.
#
# Artist IDs discovered 2026-02-18 via `--discover`; verified via `--artist-audit`.
# Multi-agent content/data review 2026-02-19: Sonnet, Opus, Minimax, GLM, Kimi.

