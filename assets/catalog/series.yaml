# DACH Hörspiel series catalog
#
# Maps known series to per-provider identifiers for discovery, matching,
# and sync. Episode resolution happens at runtime via provider APIs.
#
# Fields:
#   id                  stable snake_case identifier
#   title               canonical German series title
#   aliases             alternative titles providers may use
#   episode_pattern     regex (one capture group) extracting the episode number
#   cover_url           curated cover image URL (optional)
#   providers           per-provider identifiers:
#     spotify:
#       artist_ids      Spotify artist IDs for artist-based matching
#       albums          pre-validated album list (Spotify IDs + episode numbers)
#     apple_music:
#       artist_id       Apple Music artist ID (future)
#     ard_audiothek:
#       program_set_id  ARD programSet ID (future)
#     tidal:
#       artist_id       Tidal artist ID (future)
#
# Validated via `lauschi-catalog validate` (tools/ package).

