# DACH Hörspiel series catalog
# Used by CatalogService to match Spotify album names returned by the parent's
# search and suggest group assignments in AddCardScreen.
#
# Fields:
#   id              unique snake_case identifier (stable — stored in DB)
#   title           canonical German series title
#   aliases         alternative titles Spotify may use
#   keywords        words that must appear in the Spotify album name for a match
#                   (case-insensitive substring). Sorted longest-first at runtime.
#   episode_pattern regex with one capture group that extracts the episode number.
#                   Omit entirely for standalone (non-numbered) series.
#
# Validated against live Spotify data via scripts/validate_catalog.py.
# Run `mise run catalog-check` to re-validate after edits.
#
# ── Naming conventions found in the wild ───────────────────────────────────
# Most DACH Hörspiel publishers use one of these album-title formats:
#
#   Folge N: <episode title>          — the standard modern format
#   NN: <episode title>               — Pumuckl, Asterix (Karussell label)
#   NNN/<episode title>               — Hanni und Nanni, Heidi, Hui Buh
#   <Series> N. <episode title>       — Pippi Langstrumpf (numbered books)
#   <Series>, Folge N: <title>        — LasseMaja, Nils Holgersson
#   Band N                            — Gespensterjäger (book numbering)
#   Teil N                            — Tom Turbo (Wissensreise subseries)
#
# ── L2 (keyword) failures ──────────────────────────────────────────────────
# Several major series omit the series name from album titles on Spotify.
# Example: Die drei ??? episodes appear as "116/Codename: Cobra" — keyword
# "drei ???" never fires. CatalogService currently matches on album name only;
# artist-name matching would be needed to fix these properly.
# Affected: Die drei ???, Die drei ??? Kids, TKKG, Feuerwehrmann Sam,
#           Fünf Freunde, Die Fuchsbande, TKKG Junior, Fünf Freunde Junior.

series:

  # ── Classic Kiddinx / Europa series ────────────────────────────────────────

  - id: yakari
    title: Yakari
    aliases:
      - "Yakari"
      - "Yakari, der kleine Sioux"
    keywords:
      - yakari
    # Spotify: "Folge 9: Yakari und die Pferdediebe (Das Original-Hörspiel...)"
    episode_pattern: "[Ff]olge\\s+(\\d+)"

  - id: bibi_blocksberg
    title: Bibi Blocksberg
    aliases:
      - "Bibi Blocksberg"
    keywords:
      - "bibi blocksberg"
      - blocksberg
    # Spotify: "Folge 157: Team Blocksberg"
    episode_pattern: "[Ff]olge\\s+(\\d+)"

  - id: benjamin_bluemchen
    title: Benjamin Blümchen
    aliases:
      - "Benjamin Blümchen"
      - "Benjamin Bluemchen"
    keywords:
      - "benjamin blümchen"
      - "benjamin bluemchen"
      - blümchen
    # Spotify: "Benjamin Blümchen Gute-Nacht-Geschichten - Folge 6: ..."
    episode_pattern: "[Ff]olge\\s+(\\d+)"

  - id: die_drei_fragezeichen
    title: "Die drei ???"
    aliases:
      - "Die drei Fragezeichen"
      - "Die drei ???"
    keywords:
      - "drei ???"
      - "drei fragezeichen"
    # NOTE: L2 keyword failure. Spotify album titles use "116/Codename: Cobra"
    # format — series name not in album title. Keyword rarely fires.
    # Pattern kept for the few titles that do include "???".
    episode_pattern: "(?:Die\\s+)?drei\\s+\\?\\?\\?[,\\s]*(\\d+)"

  - id: die_drei_fragezeichen_kids
    title: "Die drei ??? Kids"
    aliases:
      - "Die drei ??? Kids"
      - "Die drei Fragezeichen Kids"
    keywords:
      - "drei ??? kids"
      - "drei fragezeichen kids"
    # NOTE: L2 keyword failure — same issue as Die drei ???.
    # Albums: "033/Nacht im Kerker", "Folge 101: Geistermusik" — no series name.
    episode_pattern: "(?:Die\\s+)?drei\\s+\\?\\?\\?\\s+Kids[,\\s]*(\\d+)"

  - id: tkkg
    title: TKKG
    aliases:
      - TKKG
    keywords:
      - tkkg
    # NOTE: L2 keyword failure. Albums: "Folge 239: Vollgas ins Verderben",
    # "140/Draculas Erben" — series name absent from album title.
    episode_pattern: "[Ff]olge\\s+(\\d+)"

  - id: bibi_und_tina
    title: Bibi & Tina
    aliases:
      - "Bibi & Tina"
      - "Bibi und Tina"
    keywords:
      - "bibi & tina"
      - "bibi und tina"
    # Spotify returns only movie soundtracks; no numbered Hörspiel series found.

  - id: pumuckl
    title: Pumuckl
    aliases:
      - Pumuckl
      - "Meister Eder und sein Pumuckl"
    keywords:
      - pumuckl
    # Spotify: "19: Pumuckl im Zoo (Das Original aus dem Fernsehen)"
    #          "06: Pumuckl und die Schule"
    episode_pattern: "^(\\d{1,2}):\\s"

  - id: conni
    title: Conni
    aliases:
      - Conni
      - "Meine Freundin Conni"
    keywords:
      - conni
    # Standalone stories, no numbering: "Conni rettet Oma", "Conni ist krank".

  - id: pippi_langstrumpf
    title: Pippi Langstrumpf
    aliases:
      - "Pippi Langstrumpf"
    keywords:
      - pippi
      - langstrumpf
    # Spotify: "Pippi Langstrumpf 1. Das Hörspiel" (numbered book trilogy)
    episode_pattern: "Pippi\\s+Langstrumpf\\s+(\\d+)[.\\s]"

  - id: pettersson_und_findus
    title: Pettersson und Findus
    aliases:
      - "Pettersson und Findus"
      - "Pettersson & Findus"
    keywords:
      - pettersson
      - findus
    # Spotify: "Folge 10: Findus und das eigene Fahrrad"
    #          "Folge 5: Wie Findus zu Pettersson kam"
    episode_pattern: "[Ff]olge\\s+(\\d+)"

  - id: das_sams
    title: Das Sams
    aliases:
      - "Das Sams"
    keywords:
      - "das sams"
    # Spotify: "Das Sams 1. Eine Woche voller Samstage" (book numbering)
    # Note: keyword "sams" was too short — matched "Samsara" etc. Use "das sams".
    episode_pattern: "(?:Das\\s+)?Sams\\s+(\\d+)[.\\s]"

  - id: feuerwehrmann_sam
    title: Feuerwehrmann Sam
    aliases:
      - "Feuerwehrmann Sam"
      - "Fireman Sam"
    keywords:
      - "feuerwehrmann sam"
      - "fireman sam"
    # NOTE: L2 keyword failure. Albums: "Folge 242: Die neue Feuerwache" —
    # series name absent. Only theme-song singles match keyword.

  - id: pan_tau
    title: Pan Tau
    aliases:
      - "Pan Tau"
    keywords:
      - "pan tau"
    # Old Czech/German series; Spotify only has soundtracks. No Hörspiel series.

  - id: biene_maja
    title: Biene Maja
    aliases:
      - "Biene Maja"
      - "Die Biene Maja"
    keywords:
      - "biene maja"
    # Spotify: "Majas Flucht aus der Heimatstadt (Die Biene Maja, Folge 1)"
    #          "Die Biene Maja 2 - Original-Hörspiel zum Kinofilm"
    episode_pattern: "(?:Die\\s+)?Biene\\s+Maja[,\\s]*(?:[Ff]olge\\s+)?(\\d+)"

  - id: hui_buh
    title: Hui Buh das Schlossgespenst
    aliases:
      - "Hui Buh"
      - "Hui Buh das Schlossgespenst"
    keywords:
      - "hui buh"
    # Spotify: "01/Hui Buh das Schlossgespenst", "002/Hui Buh und seine ..."
    #          "Folge 18: Hui Buh rettet Halloween"
    episode_pattern: "(?:^(\\d{2,3})/|[Ff]olge\\s+(\\d+))"

  - id: raeubrer_hotzenplotz
    title: Räuber Hotzenplotz
    aliases:
      - "Räuber Hotzenplotz"
      - "Der Räuber Hotzenplotz"
    keywords:
      - "räuber hotzenplotz"
      - "rauber hotzenplotz"
      - hotzenplotz
    # Spotify: "Der Räuber Hotzenplotz 1: ..." (publisher A)
    #          "1: Der Räuber Hotzenplotz"       (publisher B — leading number)
    episode_pattern: "(?:^(\\d+):\\s|[Hh]otzenplotz[^0-9]*(\\d+))"

  - id: kleiner_drache_kokosnuss
    title: Der kleine Drache Kokosnuss
    aliases:
      - "Der kleine Drache Kokosnuss"
      - "Drache Kokosnuss"
    keywords:
      - "drache kokosnuss"
      - kokosnuss
    # Standalone stories: "Der kleine Drache Kokosnuss - Das Musical", etc.

  - id: hanni_und_nanni
    title: Hanni und Nanni
    aliases:
      - "Hanni und Nanni"
    keywords:
      - "hanni und nanni"
      - "hanni & nanni"
    # Spotify: "065/Hanni und Nanni voll im Trend!"  (NNN/ format)
    #          "04/Lustige Streiche mit Hanni und Nanni" (NN/ format)
    #          "Folge 79: Prost Neujahr, Hanni und Nanni!" (Folge N: format)
    #          "Klassiker 1 - 1972 Hanni und Nanni sind immer dagegen"
    episode_pattern: "(?:^(\\d{1,3})/|[Ff]olge\\s+(\\d+)|[Kk]lassiker\\s+(\\d+))"

  - id: fuenf_freunde
    title: Fünf Freunde
    aliases:
      - "Fünf Freunde"
      - "Funf Freunde"
    keywords:
      - "fünf freunde"
      - "funf freunde"
      - "5 freunde"
    # NOTE: L2 keyword failure. Albums: "107/und die Nacht im Safari-Park",
    # "002/im Zeltlager" — series name absent. Standalone films also match.

  - id: die_olchis
    title: Die Olchis
    aliases:
      - "Die Olchis"
      - "Olchis"
    keywords:
      - olchis
    # Standalone stories: "Die Olchis im Zoo", "Die Olchis fliegen zum Mond".

  - id: hexe_lilli
    title: Hexe Lilli
    aliases:
      - "Hexe Lilli"
      - "Die Hexe Lilli"
    keywords:
      - "hexe lilli"
    # Standalone stories: "Hexe Lilli und der kleine Delfin", etc.

  - id: lauras_stern
    title: Lauras Stern
    aliases:
      - "Lauras Stern"
    keywords:
      - "lauras stern"
    # Spotify: "Lauras Stern, Folge 1: Lauras Stern"
    #          "Laura hat Geburtstag [Lauras Stern 10 (Ungekürzt)]"
    #          "Lauras Stern, Band 12: ..."
    # Pattern: match series name then any non-digit gap then the number.
    episode_pattern: "Lauras?\\s+Stern[^0-9]*(\\d+)"

  - id: tom_turbo
    title: Tom Turbo
    aliases:
      - "Tom Turbo"
    keywords:
      - "tom turbo"
    # Spotify: "Familie Vogel fragt: ... (Wissensreise mit Tom Turbo! Teil 3)"
    episode_pattern: "[Tt]eil\\s+(\\d+)"

  - id: ritter_rost
    title: Ritter Rost
    aliases:
      - "Ritter Rost"
    keywords:
      - "ritter rost"
    # Spotify returns music/song albums ("Singen mit Ritter Rost"), not Hörspiele.

  - id: kommissar_kugelblitz
    title: Kommissar Kugelblitz
    aliases:
      - "Kommissar Kugelblitz"
    keywords:
      - "kommissar kugelblitz"
      - kugelblitz
    # Location-titled series: "Kugelblitz in London", "Kugelblitz in Paris".
    # No episode numbering — each album is a standalone adventure.

  - id: nils_holgersson
    title: Nils Holgersson
    aliases:
      - "Nils Holgersson"
      - "Die wunderbare Reise des kleinen Nils Holgersson"
    keywords:
      - "nils holgersson"
    # Spotify: "Der Junge (Nils Holgersson, Folge 1)"  — series name before Folge
    #          "Folge 1: Die wunderbare Reise des kleinen Nils Holgersson" — Folge first
    #          "Nils Holgersson - Märchenklassiker Folge 7"
    episode_pattern: "(?:[Ff]olge\\s+(\\d+)|Nils\\s+Holgersson\\D*(\\d+))"

  - id: heidi
    title: Heidi
    aliases:
      - "Heidi"
    keywords:
      - heidi
    # Spotify: "06/Heidi kehrt zurück", "09/Heidi kehrt zurück (CGI)",
    #          "068/Heidi I"
    # Note: keyword "heidi" is very common (Heidi Klum etc.);
    # most false positives are filtered by the NNN/ pattern requirement.
    episode_pattern: "^(\\d{2,3})/"

  - id: ronja_raeubertocher
    title: Ronja Räubertochter
    aliases:
      - "Ronja Räubertochter"
      - "Ronja Raubertochter"
    keywords:
      - "ronja räubertochter"
      - "ronja raubertochter"
    # Single novel adaptation; no numbered Hörspiel series.

  - id: emil_detektive
    title: Emil und die Detektive
    aliases:
      - "Emil und die Detektive"
    keywords:
      - "emil und die detektive"
      - "emil detektive"
    # Single story; no numbered series.

  - id: bob_baumeister
    title: Bob der Baumeister
    aliases:
      - "Bob der Baumeister"
      - "Bob the Builder"
    keywords:
      - "bob der baumeister"
    # Standalone episode titles; no numbered series on Spotify.

  - id: wickie
    title: Wickie und die starken Männer
    aliases:
      - "Wickie und die starken Männer"
      - "Wickie"
    keywords:
      - "wickie und die starken"
      - wickie
    # Spotify returns only soundtracks and compilations. No numbered Hörspiel.

  # ── Detected from Spotify playlists / editorial sources ──────────────────

  - id: prinzessin_lillifee
    title: Prinzessin Lillifee
    aliases:
      - "Prinzessin Lillifee"
      - "Lillifee"
    keywords:
      - "prinzessin lillifee"
      - lillifee
    # Standalone stories: "Prinzessin Lillifee in der Tierklinik", etc.

  - id: die_fuchsbande
    title: Die Fuchsbande
    aliases:
      - "Die Fuchsbande"
      - "Fuchsbande"
    keywords:
      - fuchsbande
    # NOTE: L2 keyword failure. Albums: "010/Fall 19: Das Loch in der Tür",
    # "Folge 47: Fall 93: ..." — series name absent from album title.
    # Patterns kept for if/when album titles include "fuchsbande".
    episode_pattern: "(?:^(\\d{1,3})/|[Ff]olge\\s+(\\d+))"

  - id: tkkg_junior
    title: TKKG Junior
    aliases:
      - "TKKG Junior"
    keywords:
      - "tkkg junior"
    # NOTE: L2 keyword failure. Albums: "Folge 41: Aliens im Anflug" —
    # series name absent. Pattern correct for when keyword fires.
    episode_pattern: "[Ff]olge\\s+(\\d+)"

  - id: fuenf_freunde_junior
    title: Fünf Freunde Junior
    aliases:
      - "Fünf Freunde Junior"
      - "5 Freunde Junior"
    keywords:
      - "fünf freunde junior"
      - "5 freunde junior"
    # NOTE: L2 keyword failure. Albums: "Folge 1: Der unsichtbare Dieb/..." —
    # series name absent from album title.
    episode_pattern: "[Ff]olge\\s+(\\d+)"

  - id: die_playmos
    title: Die Playmos
    aliases:
      - "Die Playmos"
      - "Playmos"
    keywords:
      - playmos
    # Spotify: "Folge 46: Die Playmos ermitteln (Das Original Playmobil Hörspiel)"
    #          "Folge 23: Die Playmos in geheimer Mission"
    episode_pattern: "[Ff]olge\\s+(\\d+)"

  - id: wendy
    title: Wendy
    aliases:
      - "Wendy"
    keywords:
      - "wendy"
    # Spotify: "Folge 22: Wendy verliebt sich"   (Folge N: format)
    #          "005/Wendy Wolf hat Geburtstag"     (NNN/ format)
    episode_pattern: "(?:[Ff]olge\\s+(\\d+)|^(\\d{3})/)"

  - id: asterix
    title: Asterix
    aliases:
      - "Asterix"
      - "Asterix und Obelix"
    keywords:
      - asterix
    # Spotify: "41: Asterix in Lusitanien", "02: Asterix und Kleopatra"
    episode_pattern: "^(\\d{1,2}):\\s"

  - id: lucky_luke
    title: Lucky Luke
    aliases:
      - "Lucky Luke"
    keywords:
      - "lucky luke"
    # Spotify returns French soundtracks and unrelated singles.
    # No German numbered Hörspiel series found. Kept for keyword awareness.

  # ── Michael Ende works ─────────────────────────────────────────────────────

  - id: michael_ende
    title: Michael Ende
    aliases:
      - "Momo"
      - "Die unendliche Geschichte"
      - "Jim Knopf und Lukas der Lokomotivführer"
      - "Jim Knopf und die Wilde 13"
      - "Der Wunschpunsch"
      - "Das Traumfresserchen"
    keywords:
      - "jim knopf"
      - "unendliche geschichte"
      - wunschpunsch
      - traumfresserchen
      - momo
    # Standalone novels; no episode numbering.

  # ── Cornelia Funke ─────────────────────────────────────────────────────────

  - id: gespensterjager
    title: Gespensterjäger
    aliases:
      - "Gespensterjäger"
      - "Geisterjäger"
    keywords:
      - "gespensterjäger"
      - "gespensterjager"
    # Spotify: "Gespensterjäger auf eisiger Spur (Band 1)"  — Band N in parens
    #          "Gespensterjäger im Feuerspuk (Band 2)"
    #          "Folge 5: Gespensterjäger und der Weihnachtsspuk"
    #          "04/Der Schatten des Gespensterjägers"
    episode_pattern: "(?:[Bb]and\\s+(\\d+)|[Ff]olge\\s+(\\d+)|^(\\d{2,3})/)"

  # ── Astrid Lindgren ────────────────────────────────────────────────────────

  - id: bullerbue
    title: Bullerbü
    aliases:
      - "Geschichten aus Bullerbü"
      - "Bullerbü"
      - "Bullerbue"
    keywords:
      - bullerbü
      - bullerbue
    # Standalone stories; no numbered series.

  # ── Janosch ────────────────────────────────────────────────────────────────

  - id: janosch
    title: Janosch
    aliases:
      - "Oh, wie schön ist Panama"
      - "Der kleine Tiger"
      - "Janosch"
      - "Tigerente"
    keywords:
      - "oh wie schön ist panama"
      - tigerente
      - janosch
