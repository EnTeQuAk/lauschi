  # ── Detektivbüro LasseMaja ─────────────────────────────────────────────────

  - id: lassemaja
    title: Detektivbüro LasseMaja
    aliases:
      - "Detektivbüro LasseMaja"
      - "LasseMaja"
      - "Lasse-Maja"
    keywords:
      - "lassemaja"
      - "lasse-maja"
      - "lasse maja"
    # Spotify: "Detektivbüro LasseMaja 1", "Detektivbüro LasseMaja, Band 2", etc.
    episode_pattern: "(?:Detektivbüro\\s+)?LasseMaja[,\\s]*(Teil\\s+|Band\\s+)?(\\d+)"
