# DACH Hörspiel series catalog
# Used by CatalogService to match Spotify search results and suggest
# group assignments in AddCardScreen.
#
# Fields:
#   id: unique identifier (snake_case)
#   title: canonical series title
#   aliases: alternative titles Spotify may use
#   keywords: words that strongly signal this series (case-insensitive)
#   episode_pattern: regex with one capture group for the episode number

