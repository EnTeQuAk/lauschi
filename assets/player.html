<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lauschi player</title>
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
</head>
<body>
<script>
  // lauschi Spotify Web Playback SDK bridge.
  //
  // Dart → JS commands via: controller.runJavaScript('lauschi.<method>(...)')
  // JS → Dart events via:   SpotifyBridge.postMessage(JSON.stringify({type, payload}))
  //
  // NOTE: On iOS, WKWebView suspends JS ~30s after backgrounding.
  // UIBackgroundModes: audio in Info.plist is necessary but may not suffice.

  var player = null;
  var deviceId = null;

  function post(type, payload) {
    try {
      SpotifyBridge.postMessage(JSON.stringify({ type: type, payload: payload || {} }));
    } catch(e) {
      console.error('[lauschi] postMessage failed:', e);
    }
  }

  function post_log(msg) {
    post('log', { message: msg });
  }

  // Called by Dart once SDK is ready and token is available.
  window.lauschi = {
    init: function(accessToken) {
      post_log('init called, creating Spotify.Player');

      player = new Spotify.Player({
        name: 'lauschi',
        getOAuthToken: function(cb) {
          // Token refresh: Dart handles expiry. We request a fresh token via bridge.
          post('token_request', {});
          // The callback is stored and called when Dart responds with refreshed token.
          window._pendingTokenCallback = cb;
        },
        volume: 0.8,
      });

      player.addListener('ready', function(data) {
        deviceId = data.device_id;
        post('ready', { device_id: deviceId });
        post_log('Player ready, device_id: ' + deviceId);
      });

      player.addListener('not_ready', function(data) {
        post('not_ready', { device_id: data.device_id });
        post_log('Player not ready — attempting reconnect');
        // Re-register the device with Spotify's servers.
        player.connect().then(function(success) {
          post_log('Reconnect attempt: ' + success);
          if (!success) {
            post('error', { type: 'reconnect', message: 'reconnect failed' });
          }
        });
      });

      player.addListener('player_state_changed', function(state) {
        if (!state) {
          post('state_changed', { paused: true, track: null, position_ms: 0 });
          return;
        }
        var tw = state.track_window;
        var prevCount = tw.previous_tracks ? tw.previous_tracks.length : 0;
        var nextCount = tw.next_tracks ? tw.next_tracks.length : 0;
        post('state_changed', {
          paused: state.paused,
          position_ms: state.position,
          duration_ms: state.duration,
          // Track position within album (approximate for very long albums
          // where the SDK window caps at ~20 previous tracks).
          track_number: prevCount + 1,
          next_tracks_count: nextCount,
          track: tw.current_track ? {
            uri: tw.current_track.uri,
            name: tw.current_track.name,
            artist: tw.current_track.artists.map(function(a) { return a.name; }).join(', '),
            album: tw.current_track.album.name,
            artwork_url: tw.current_track.album.images[0] ? tw.current_track.album.images[0].url : null,
          } : null,
        });
      });

      player.addListener('initialization_error', function(e) {
        post('error', { type: 'init', message: e.message });
        post_log('Init error: ' + e.message);
      });

      player.addListener('authentication_error', function(e) {
        post('error', { type: 'auth', message: e.message });
        post_log('Auth error: ' + e.message);
      });

      player.addListener('account_error', function(e) {
        post('error', { type: 'account', message: e.message });
        post_log('Account error (Premium required): ' + e.message);
      });

      player.addListener('playback_error', function(e) {
        post('error', { type: 'playback', message: e.message });
        post_log('Playback error: ' + e.message);
      });

      player.connect().then(function(success) {
        post_log('player.connect() resolved: ' + success);
        if (!success) {
          post('error', { type: 'connect', message: 'connect() returned false' });
        }
      });

      // Provide initial token directly (avoids first round-trip).
      if (window._pendingTokenCallback) {
        window._pendingTokenCallback(accessToken);
        window._pendingTokenCallback = null;
      }
    },

    // Called by Dart to deliver a refreshed token.
    deliver_token: function(accessToken) {
      post_log('deliver_token called');
      if (window._pendingTokenCallback) {
        window._pendingTokenCallback(accessToken);
        window._pendingTokenCallback = null;
      }
    },

    // Transfer playback to this device and start playing a URI.
    play: function(spotifyUri) {
      if (!deviceId) {
        post('error', { type: 'play', message: 'no device_id yet' });
        return;
      }
      post_log('play: ' + spotifyUri);
      // Playback is transferred + started via the Spotify Web API (Dart-side).
      // The JS player just needs to be the active device.
      post('play_request', { uri: spotifyUri, device_id: deviceId });
    },

    toggle_play: function() {
      if (player) player.togglePlay();
    },

    next_track: function() {
      if (player) player.nextTrack();
    },

    prev_track: function() {
      if (player) player.previousTrack();
    },

    seek: function(position_ms) {
      if (player) player.seek(position_ms);
    },

    set_volume: function(volume) {
      if (player) player.setVolume(volume);
    },

    // Re-register the SDK player with Spotify. Called by Dart when
    // the device_id goes stale (404 on play).
    reconnect: function() {
      if (player) {
        post_log('reconnect called');
        player.connect().then(function(success) {
          post_log('reconnect result: ' + success);
          if (!success) {
            post('error', { type: 'reconnect', message: 'reconnect failed' });
          }
        });
      } else {
        post('error', { type: 'reconnect', message: 'no player instance' });
      }
    },

    disconnect: function() {
      if (player) {
        player.disconnect();
        player = null;
        deviceId = null;
      }
    },
  };

  window.onSpotifyWebPlaybackSDKReady = function() {
    post_log('SDK ready');
    post('sdk_ready', {});
    // Dart will call lauschi.init(token) after receiving sdk_ready.
  };
</script>
</body>
</html>
