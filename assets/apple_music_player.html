<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lauschi apple music player</title>
</head>
<body>
<script>
  // lauschi Apple Music MusicKit JS bridge.
  //
  // Unlike Spotify (where Dart handles OAuth and passes tokens to JS),
  // MusicKit JS must handle its own auth flow because the web playback
  // token is different from the native SDK token. In a WebView, MusicKit
  // JS redirects in the current window for auth (no popup).
  //
  // Dart → JS: controller.runJavaScript('lauschi.<method>(...)')
  // JS → Dart: AppleMusicBridge.postMessage(JSON.stringify({type, payload}))

  var music = null;
  var _configured = false;
  var _positionInterval = null;

  function post(type, payload) {
    try {
      AppleMusicBridge.postMessage(JSON.stringify({ type: type, payload: payload || {} }));
    } catch(e) {
      // Bridge might not be available during auth redirect.
      console.log('[lauschi] postMessage failed:', e);
    }
  }

  function post_log(msg) {
    post('log', { message: msg });
  }

  window.lauschi = {
    // Called by Dart with the developer token. User auth happens in JS
    // via MusicKit's own authorize() flow (redirect-based in WebViews).
    init: async function(developerToken) {
      post_log('init called');

      try {
        if (!_configured) {
          await MusicKit.configure({
            developerToken: developerToken,
            app: {
              name: 'lauschi',
              build: '1.0.0'
            },
            // DACH market. setQueue uses this to resolve content IDs.
            storefrontId: 'de'
          });
          _configured = true;
        }

        music = MusicKit.getInstance();
        post_log('MusicKit instance: ' + (music ? 'OK' : 'NULL'));
        post_log('isAuthorized: ' + music.isAuthorized);

        if (!music.isAuthorized) {
          // Save state so we know to resume after auth redirect.
          sessionStorage.setItem('lauschi_pending_auth', 'true');
          post_log('Not authorized, calling authorize() (will redirect)');
          // Tell Dart we need auth. Dart should show the WebView.
          post('needs_auth', {});
          await music.authorize();
          // If we get here, auth succeeded (page might have reloaded).
          post_log('authorize() resolved');
        }

        post_log('isAuthorized: ' + music.isAuthorized);
        post_log('musicUserToken: ' + (music.musicUserToken ? music.musicUserToken.length + ' chars' : 'null'));
        post_log('storefrontId: ' + music.storefrontId);

        // Wire up event listeners
        _setupListeners();

        post('ready', { is_authorized: music.isAuthorized });
        post_log('MusicKit JS ready');

      } catch(e) {
        post('error', { type: 'init', message: '' + e });
        post_log('Init failed: ' + e);
      }
    },

    play_album: async function(albumId, trackIndex, storefront) {
      if (!music) { post('error', { type: 'playback', message: 'not initialized' }); return; }
      trackIndex = trackIndex || 0;
      storefront = storefront || 'de';
      post_log('play_album: ' + albumId + ' track: ' + trackIndex + ' sf: ' + storefront);

      // Ensure authorized before playback (docs: "check authorization before calling play()")
      if (!music.isAuthorized) {
        post_log('Not authorized, calling authorize()');
        post('needs_auth', {});
        try {
          await music.authorize();
        } catch(authErr) {
          post('error', { type: 'auth', message: 'authorize failed: ' + authErr });
          return;
        }
      }

      // Try direct album queue first
      try {
        await music.setQueue({ album: albumId, startWith: trackIndex, startPlaying: true });
        post_log('setQueue OK');
        return;
      } catch(e) {
        post_log('setQueue({album}) failed: ' + e);
      }

      // Fallback: use URL with {{storefrontId}} auto-replacement
      try {
        var url = 'https://music.apple.com/' + storefront + '/album/' + albumId;
        post_log('Trying URL: ' + url);
        await music.setQueue({ url: url, startWith: trackIndex, startPlaying: true });
        post_log('setQueue({url}) OK');
        return;
      } catch(e2) {
        post_log('setQueue({url}) failed: ' + e2);
      }

      // Last resort: fetch tracks and queue individually
      try {
        var result = await music.api.music('/v1/catalog/{{storefrontId}}/albums/' + albumId, { include: 'tracks' });
        var album = result && result.data && result.data.data && result.data.data[0];
        if (album && album.relationships && album.relationships.tracks) {
          var tracks = album.relationships.tracks.data;
          var songIds = tracks.map(function(t) { return t.id; });
          post_log('Fetched ' + songIds.length + ' tracks');
          if (trackIndex > 0) songIds = songIds.slice(trackIndex);
          await music.setQueue({ songs: songIds, startPlaying: true });
          post_log('setQueue({songs}) OK');
          return;
        }
      } catch(e3) {
        post_log('song fallback failed: ' + e3);
      }

      post('error', { type: 'playback', message: 'All setQueue attempts failed for album ' + albumId });
    },

    pause: function() {
      if (music) music.pause();
    },

    resume: function() {
      if (music) music.play();
    },

    stop: function() {
      if (music) try { music.stop(); } catch(e) {}
    },

    next_track: function() {
      if (music) music.skipToNextItem();
    },

    prev_track: function() {
      if (music) music.skipToPreviousItem();
    },

    seek: function(position_ms) {
      if (music) music.seekToTime(position_ms / 1000.0);
    },

    disconnect: function() {
      _stopPositionPolling();
      if (music) { try { music.stop(); } catch(e) {} music = null; }
      _configured = false;
    }
  };

  function _setupListeners() {
    music.addEventListener('playbackStateDidChange', function() {
      var state = music.playbackState;
      var isPlaying = (state === MusicKit.PlaybackStates.playing);
      var isPaused = (state === MusicKit.PlaybackStates.paused);

      post('state_changed', {
        is_playing: isPlaying,
        is_paused: isPaused,
        is_stopped: !isPlaying && !isPaused,
        position_ms: Math.round((music.currentPlaybackTime || 0) * 1000),
        duration_ms: Math.round((music.currentPlaybackDuration || 0) * 1000),
        state: state
      });

      if (isPlaying) { _startPositionPolling(); }
      else { _stopPositionPolling(); }
    });

    music.addEventListener('nowPlayingItemDidChange', function() {
      var item = music.nowPlayingItem;
      if (!item) {
        post('track_changed', { track: null });
        return;
      }

      var queue = music.queue;
      var currentIndex = queue ? queue.position : 0;
      var totalTracks = queue ? queue.items.length : 0;

      var artUrl = null;
      if (item.attributes && item.attributes.artwork) {
        artUrl = item.attributes.artwork.url
          .replace('{w}', '300').replace('{h}', '300');
      }

      post('track_changed', {
        track: {
          id: item.id,
          name: item.attributes ? item.attributes.name : '',
          artist: item.attributes ? item.attributes.artistName : '',
          album: item.attributes ? item.attributes.albumName : '',
          artwork_url: artUrl,
          duration_ms: item.attributes ? (item.attributes.durationInMillis || 0) : 0
        },
        track_index: currentIndex,
        total_tracks: totalTracks
      });
    });

    music.addEventListener('playbackTimeDidChange', function() {
      post('position', {
        position_ms: Math.round((music.currentPlaybackTime || 0) * 1000),
        duration_ms: Math.round((music.currentPlaybackDuration || 0) * 1000)
      });
    });

    music.addEventListener('mediaPlaybackError', function(event) {
      post_log('playback error: ' + JSON.stringify(event));
      post('error', { type: 'playback', message: '' + event });
    });
  }

  function _startPositionPolling() {
    _stopPositionPolling();
    _positionInterval = setInterval(function() {
      if (!music) return;
      post('position', {
        position_ms: Math.round((music.currentPlaybackTime || 0) * 1000),
        duration_ms: Math.round((music.currentPlaybackDuration || 0) * 1000)
      });
    }, 500);
  }

  function _stopPositionPolling() {
    if (_positionInterval) { clearInterval(_positionInterval); _positionInterval = null; }
  }

  // On page load: check if we're returning from an auth redirect.
  // MusicKit JS native webview flow: page unloads for auth, reloads after.
  document.addEventListener('musickitloaded', async function() {
    post_log('MusicKit JS loaded');

    var pendingAuth = sessionStorage.getItem('lauschi_pending_auth');
    if (pendingAuth) {
      sessionStorage.removeItem('lauschi_pending_auth');
      post_log('Returning from auth redirect');
      // Re-configure and check auth status.
      // Dart will call init() but we can also self-init here.
    }

    post('sdk_ready', {});
  });
</script>
<script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" async></script>
</body>
</html>
