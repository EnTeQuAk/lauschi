<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lauschi — Apple Music verbinden</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #6e6e73; margin-bottom: 24px; line-height: 1.5; }
    .status { font-size: 14px; color: #1d1d1f; margin-top: 16px; }
    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid #e5e5ea;
      border-top-color: #fc3c44;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ff3b30; }
    .success { color: #34c759; }
  </style>
  <script>
    // Force redirect-based auth instead of popup. Mobile browsers
    // (especially Firefox) can't reliably relay tokens between tabs
    // via postMessage. By overriding window.open, MusicKit JS's
    // authorize() redirects in the same tab instead of opening a popup.
    // Apple Developer Forums workaround: https://developer.apple.com/forums/thread/674118
    window.open = function(url) {
      window.location.href = url;
      return null;
    };
  </script>
  <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" async></script>
</head>
<body>
  <div class="card">
    <div class="logo">🦊</div>
    <h1>Apple Music verbinden</h1>
    <p>lauschi braucht Zugriff auf Apple Music, um Hörspiele abspielen zu können.</p>
    <div id="status">
      <div class="spinner"></div>
      <div class="status">Verbindung wird hergestellt...</div>
    </div>
  </div>

  <script>
    // Server-side redirect endpoint. Responds with HTTP 302 to
    // lauschi://apple-music-callback which triggers the Android
    // deep link intent reliably (same pattern as Spotify OAuth).
    var REDIRECT_ENDPOINT = 'https://tuneloopbot.webshox.org/lauschi/apple-callback';

    // Parse query params. On first load: ?token=JWT&state=RANDOM
    // On return from Apple login: URL may have Apple's callback params.
    var params = new URLSearchParams(window.location.search);
    var developerToken = params.get('token');
    var state = params.get('state');

    // Persist auth state across the Apple login redirect so we can
    // recover it when Apple sends the user back to this page.
    if (developerToken && state) {
      sessionStorage.setItem('lauschi_dev_token', developerToken);
      sessionStorage.setItem('lauschi_auth_state', state);
    }

    // Recover state from before the redirect (second page load).
    var savedDevToken = sessionStorage.getItem('lauschi_dev_token');
    var savedState = sessionStorage.getItem('lauschi_auth_state');

    function setStatus(text, cls) {
      var el = document.getElementById('status');
      el.innerHTML = '<div class="status ' + (cls || '') + '">' + text + '</div>';
    }

    function cleanup() {
      sessionStorage.removeItem('lauschi_dev_token');
      sessionStorage.removeItem('lauschi_auth_state');
    }

    function redirectToApp(queryParams) {
      var parts = [];
      for (var key in queryParams) {
        parts.push(encodeURIComponent(key) + '=' + encodeURIComponent(queryParams[key]));
      }
      window.location.href = REDIRECT_ENDPOINT + '?' + parts.join('&');
    }

    function handleToken(music) {
      var token = music.musicUserToken;
      var authState = savedState || state || '';
      setStatus('Verbunden! Zurück zur App...', 'success');
      cleanup();
      redirectToApp({
        code: token,
        state: authState,
        storefront: music.storefrontId || 'de'
      });
    }

    var devToken = developerToken || savedDevToken;
    if (!devToken) {
      setStatus('Fehler: Kein Developer Token.', 'error');
    } else {
      document.addEventListener('musickitloaded', async function() {
        try {
          await MusicKit.configure({
            developerToken: devToken,
            app: { name: 'lauschi', build: '1.0.0' },
            storefrontId: 'de'
          });

          var music = MusicKit.getInstance();

          // After redirect back from Apple login, MusicKit JS detects
          // the callback params and sets the token automatically.
          if (music.isAuthorized && music.musicUserToken) {
            handleToken(music);
            return;
          }

          setStatus('Apple Music Anmeldung...');

          // authorize() will redirect this page to Apple login
          // (window.open is overridden above to force same-tab).
          // After login, Apple redirects back here. On that second
          // load, the token check above catches it.
          var userToken = await music.authorize();

          // authorize() resolves immediately if MusicKit JS already
          // has a cached token (e.g. from a previous session).
          if (userToken) {
            handleToken(music);
          } else {
            setStatus('Anmeldung fehlgeschlagen.', 'error');
            cleanup();
            redirectToApp({ error: 'no_token', state: savedState || state || '' });
          }
        } catch(e) {
          setStatus('Fehler: ' + e, 'error');
          cleanup();
          redirectToApp({ error: '' + e, state: savedState || state || '' });
        }
      });
    }
  </script>
</body>
</html>
