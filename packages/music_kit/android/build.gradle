group 'app.misi.music_kit'
version '1.0-SNAPSHOT'

buildscript {
   ext {
       agp_version = '8.13.2'
       kotlin_version = '2.2.20'

   }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath "com.android.tools.build:gradle:$agp_version"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"

    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://jitpack.io" }
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'


android {
    namespace 'app.misi.music_kit'

    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_21
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        test.java.srcDirs += 'src/test/kotlin'
    }

    defaultConfig {
        minSdk = 21
        consumerProguardFiles 'consumer-rules.pro'
    }

    dependencies {
        testImplementation 'org.jetbrains.kotlin:kotlin-test'
        testImplementation 'org.mockito:mockito-core:5.23.0'

        implementation "io.jsonwebtoken:jjwt-api:0.13.0"
        runtimeOnly "io.jsonwebtoken:jjwt-impl:0.13.0"
        runtimeOnly "io.jsonwebtoken:jjwt-jackson:0.12.6"
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }
}

dependencies {
    // musickitauth: native Apple Music auth UI (requestUserToken,
    // requestAuthorizationStatus). Used alongside our web auth flow.
    implementation 'com.github.misiio:musickitauth:1.1.2'

    // ExoPlayer/Media3 for Apple Music HLS + Widevine DRM playback.
    // Version must match just_audio's media3 version to avoid conflicts.
    def media3_version = "1.9.3"
    implementation "androidx.media3:media3-exoplayer:$media3_version"
    implementation "androidx.media3:media3-exoplayer-hls:$media3_version"
    implementation "androidx.media3:media3-datasource-okhttp:$media3_version"


}
