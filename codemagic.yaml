workflows:
  ios-adhoc:
    name: iOS Ad-Hoc (direct install)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: 3.41.1
      xcode: latest
      cocoapods: default
      groups:
        - app-store-credentials
        - app-env
    integrations:
      app_store_connect: Lauschi
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Register test devices & fetch ad-hoc signing
        script: |
          # Register the iPad if not already known.
          app-store-connect add-device \
            --name "iPad Christopher" \
            --platform IOS \
            --udid "00008101-000A59413651003A" \
            || true
          app-store-connect fetch-signing-files "app.lauschi.lauschi" \
            --type IOS_APP_ADHOC \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Write .env file
        script: |
          cat <<EOF > $CM_BUILD_DIR/.env
          SPOTIFY_CLIENT_ID=$SPOTIFY_CLIENT_ID
          SENTRY_DSN=$SENTRY_DSN
          SENTRY_ENVIRONMENT=$SENTRY_ENVIRONMENT
          EOF

      - name: Install dependencies
        script: flutter pub get

      - name: Run code generation
        script: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS ad-hoc
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --dart-define-from-file=$CM_BUILD_DIR/.env \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: 3.41.1
      xcode: latest
      cocoapods: default
      groups:
        - app-store-credentials
        - app-env
    integrations:
      app_store_connect: Lauschi
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "app.lauschi.lauschi" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Write .env file
        script: |
          cat <<EOF > $CM_BUILD_DIR/.env
          SPOTIFY_CLIENT_ID=$SPOTIFY_CLIENT_ID
          SENTRY_DSN=$SENTRY_DSN
          SENTRY_ENVIRONMENT=$SENTRY_ENVIRONMENT
          EOF

      - name: Install dependencies
        script: flutter pub get

      - name: Run code generation
        script: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --dart-define-from-file=$CM_BUILD_DIR/.env \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
