include: package:very_good_analysis/analysis_options.yaml

analyzer:
  errors:
    missing_required_param: error
    missing_return: error
    # Make fixme noisier than todo so they stand out.
    fixme: warning
    todo: info
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "packages/**"

linter:
  rules:
    # New rules not yet in VGA
    avoid_futureor_void: true
    unnecessary_async: true
    unsafe_variance: true
    # Relaxed rules
    public_member_api_docs: false # app, not library
    lines_longer_than_80_chars: false # formatter handles it
    flutter_style_todos: false # we use TODO(#issue) not TODO(username)
    # Riverpod codegen returns unexported types for family providers.
    specify_nonobvious_property_types: false
