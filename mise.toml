[tools]
flutter = "3.41.1"
gh = "latest"
java = "temurin-17.0.18+8"

[env]
_.file = ".env"
JAVA_HOME = "{{env.HOME}}/.local/share/mise/installs/java/temurin-17.0.18+8"
# Strip microphone code from audio_session plugin (kids app, no mic needed).
AUDIO_SESSION_MICROPHONE = "0"

[tasks.setup]
description = "Install deps, run codegen, verify analysis"
run = """
flutter pub get
dart run build_runner build --delete-conflicting-outputs
flutter analyze --fatal-infos
"""

[tasks.codegen]
description = "Run build_runner (Riverpod + Drift)"
run = "dart run build_runner build --delete-conflicting-outputs"

[tasks.watch]
description = "Run build_runner in watch mode"
run = "dart run build_runner watch --delete-conflicting-outputs"

[tasks.test]
description = "Run all tests"
run = "flutter test --dart-define-from-file=.env"

[tasks.dev]
description = "Run on connected device (extra args passed through)"
run = "flutter run --dart-define-from-file=.env"

[tasks.build]
description = "Build APK (runs codegen first)"
depends = ["codegen"]
run = "flutter build apk --dart-define-from-file=.env"

[tasks.check]
description = "Full CI check: format + analyze + test"
run = """
dart format --set-exit-if-changed .
flutter analyze --fatal-infos
flutter test --dart-define-from-file=.env
"""

[tasks.catalog-check]
description = "Validate series.yaml against live Spotify data (L1-L4)"
run = "uv run scripts/validate_catalog.py"

[tasks.catalog-check-fresh]
description = "Validate series.yaml — bypass cache, hit Spotify API directly"
run = "uv run scripts/validate_catalog.py --no-cache"

[tasks.catalog-audit]
description = "Full L5 artist-discography audit (fetches all albums per artist)"
run = "uv run scripts/validate_catalog.py --artist-audit"

[tasks.catalog-discover]
description = "Search Spotify for artist candidates for series without artist IDs"
run = "uv run scripts/validate_catalog.py --discover"

[tasks.catalog-curate]
description = "AI-curated series.yaml entry via pydantic-ai + Spotify (needs OPENCODE_API_KEY)"
run = "uv run scripts/curate-series.py"

[tasks.catalog-review]
description = "Review AI-curated series and write approved entries to series.yaml"
run = "uv run scripts/review-curation.py"

[tasks.catalog-report]
description = "Analyze all curations and report issues (gaps, dupes, suspicious)"
run = "uv run scripts/catalog-report.py"

[tasks.catalog-edit]
description = "CLI for editing curations (add/remove/toggle/approve/search)"
run = "uv run scripts/catalog-edit.py"

[tasks.catalog-apply-splits]
description = "Execute split proposals from AI review (dry-run by default, --apply to write)"
run = "uv run scripts/apply-splits.py"

[tasks.catalog-review-ai]
description = "AI-assisted review of curated series (splits, gap-filling, dedup)"
run = "uv run scripts/review-series.py"

[tasks.catalog-titles]
description = "Quick artist discovery + optional AI YAML snippet"
run = "uv run scripts/discover-titles.py"

[tasks.cache-clear]
description = "Clear Spotify API disk cache"
run = "python3 -c \"import sys; sys.path.insert(0, 'scripts'); from spotify_cache import clear_cache; n = clear_cache(); print(f'Cleared {n} entries')\""

[tasks.coverage]
description = "Run tests with coverage and print summary"
run = """
flutter test --coverage --dart-define-from-file=.env
dart run tool/coverage_summary.dart
"""

[tasks.test-integration]
description = "Run integration tests on connected device"
run = "flutter test integration_test/ --dart-define-from-file=.env"

[tasks.ios-install]
description = "Install ad-hoc IPA on USB-connected iPad via pymobiledevice3"
run = """
#!/usr/bin/env bash
set -euo pipefail
IPA="${1:-}"
if [ -z "$IPA" ]; then
  echo "Usage: mise run ios-install <path-to-ipa>"
  echo ""
  echo "Download the IPA from Codemagic artifacts, then:"
  echo "  mise run ios-install ~/Downloads/lauschi.ipa"
  exit 1
fi
echo "Connected devices:"
pymobiledevice3 usbmux list --no-color 2>/dev/null | grep -E 'DeviceName|UniqueDeviceID' || idevice_id -l
echo ""
echo "Installing $IPA..."
pymobiledevice3 apps install "$IPA"
echo "Done."
"""
