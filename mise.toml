[tools]
flutter = "3.41.7"
gh = "latest"
java = "temurin-25.0.3+9.0.LTS"
biome = "1.9.4"

[env]
_.file = ".env"
JAVA_HOME = "{{env.HOME}}/.local/share/mise/installs/java/temurin-21.0.10+7.0.LTS"
# Strip microphone code from audio_session plugin (kids app, no mic needed).
AUDIO_SESSION_MICROPHONE = "0"

[tasks.setup]
description = "Install deps, run codegen, verify analysis"
run = """
flutter pub get
dart run build_runner build --delete-conflicting-outputs
flutter analyze --fatal-infos
"""

[tasks.codegen]
description = "Run build_runner (Riverpod + Drift)"
run = "dart run build_runner build --delete-conflicting-outputs"

[tasks.watch]
description = "Run build_runner in watch mode"
run = "dart run build_runner watch --delete-conflicting-outputs"

[tasks.test]
description = "Run all tests"
run = "flutter test --dart-define-from-file=.env.app"

[tasks.dev]
description = "Run on connected device with all providers + Sentry enabled"
run = """
  SENTRY_DSN=$(grep SENTRY_DSN .env 2>/dev/null | cut -d= -f2-)
  SPOTIFY_CLIENT_ID=$(grep SPOTIFY_CLIENT_ID .env 2>/dev/null | cut -d= -f2-)
  flutter run --dart-define-from-file=.env.app \
    --dart-define=ENABLE_SENTRY=true \
    --dart-define="SENTRY_DSN=$SENTRY_DSN" \
    --dart-define=SENTRY_ENVIRONMENT=development \
    --dart-define=ENABLE_SPOTIFY=true \
    --dart-define="SPOTIFY_CLIENT_ID=$SPOTIFY_CLIENT_ID" \
    --dart-define=ENABLE_APPLE_MUSIC=true
"""

[tasks.build]
description = "Build APK (runs codegen first)"
depends = ["codegen"]
run = "flutter build apk --dart-define-from-file=.env.app"

[tasks.check]
description = "Full CI check: format + analyze + test"
run = """
dart format --set-exit-if-changed .
flutter analyze --fatal-infos
flutter test --dart-define-from-file=.env.app
"""

# ── Catalog tooling (multi-provider) ─────────────────────────────────
#
# All commands via lauschi-catalog CLI (tools/ package).

[tasks.catalog-add]
description = "Add a new series to the catalog"
run = "uv run --directory tools lauschi-catalog add"

[tasks.catalog-discover]
description = "Discover missing artist IDs across all providers"
run = "uv run --directory tools lauschi-catalog discover --write"

[tasks.catalog-discover-dry]
description = "Discover missing artist IDs (dry run, no write)"
run = "uv run --directory tools lauschi-catalog discover"

[tasks.catalog-validate]
description = "Validate series.yaml against all provider APIs (L1 + L5)"
run = "uv run --directory tools lauschi-catalog validate"

[tasks.catalog-validate-spotify]
description = "Validate series.yaml against Spotify only"
run = "uv run --directory tools lauschi-catalog validate -p spotify"

[tasks.catalog-validate-apple]
description = "Validate series.yaml against Apple Music only"
run = "uv run --directory tools lauschi-catalog validate -p apple_music"

[tasks.catalog-curate]
description = "AI-curate a series across all providers (needs OPENCODE_API_KEY)"
run = "uv run --directory tools --extra ai lauschi-catalog curate"

[tasks.catalog-curate-all]
description = "AI-curate ALL series (runs for hours, both providers)"
usage = 'flag "--force" help="Re-curate even if curation JSON already exists"'
run = """
FORCE_FLAG=""
if [ "$usage_force" = "true" ]; then FORCE_FLAG="--force"; fi
uv run --directory tools --extra ai lauschi-catalog curate --all --timeout 3600 $FORCE_FLAG
"""

[tasks.catalog-audit]
description = "4-eye audit: second AI model reviews curations (all by default, or one series)"
usage = '''
flag "--force" help="Re-audit even already-approved curations"
arg "[series_id]" help="Optional series id; if omitted, audits all"
'''
run = """
#!/usr/bin/env bash
set -euo pipefail

LOGDIR="logs/catalog"
mkdir -p "$LOGDIR"
TIMESTAMP=$(date +%Y%m%d-%H%M%S)
SID="${usage_series_id:-}"
LOG_SUFFIX="${SID:-all}"
LOG="$LOGDIR/audit-${LOG_SUFFIX}-${TIMESTAMP}.log"
echo "Logging to $LOG"
exec > >(tee -a "$LOG") 2>&1

FORCE_FLAG=""
if [ "${usage_force:-false}" = "true" ]; then FORCE_FLAG="--force"; fi

if [ -n "$SID" ]; then
  uv run --directory tools --extra ai \\
    lauschi-catalog audit -s "$SID" $FORCE_FLAG
else
  uv run --directory tools --extra ai \\
    lauschi-catalog audit $FORCE_FLAG
fi
"""

[tasks.catalog-review]
description = "List series needing human attention (escalated, flagged)"
run = "uv run --directory tools lauschi-catalog review-human -d"

[tasks.catalog-apply]
description = "Write all approved curations to series.yaml"
run = "uv run --directory tools lauschi-catalog apply --all"

[tasks.catalog-report]
description = "Show statistics for all curations"
run = "uv run --directory tools lauschi-catalog report"

[tasks.catalog-log-summary]
description = "Per-series re-run report from the latest pipeline log"
run = "uv run --directory tools lauschi-catalog log-summary"

[tasks.catalog-test]
description = "Run the lauschi-catalog Python test suite"
run = "uv run --directory tools --extra ai pytest"

[tasks.catalog-edit]
description = "Edit curation files (exclude/include/list)"
run = "uv run --directory tools lauschi-catalog edit"

[tasks.catalog-splits]
description = "Manage split proposals (list, show, accept, reject)"
run = "uv run --directory tools lauschi-catalog splits"

# ── Full pipeline shortcut ───────────────────────────────────────────

[tasks.catalog-pipeline]
description = "Full automated curation pipeline: curate → audit → lint → apply → validate"
usage = 'flag "--force" help="Re-curate all series, even those already curated"'
run = """
#!/usr/bin/env bash
set -euo pipefail

AI_DEPS="--extra ai"
RUN="uv run --directory tools $AI_DEPS lauschi-catalog"
RUN_CORE="uv run --directory tools lauschi-catalog"

TIMEOUT="${TIMEOUT:-1800}"

LOGDIR="logs/catalog"
mkdir -p "$LOGDIR"
TIMESTAMP=$(date +%Y%m%d-%H%M%S)
LOG="$LOGDIR/pipeline-$TIMESTAMP.log"
echo "Logging to $LOG"

# Tee all output to both terminal and log file
exec > >(tee -a "$LOG") 2>&1

FORCE_FLAG=""
if [ "${usage_force:-false}" = "true" ]; then FORCE_FLAG="--force"; fi

echo "Step 1/5: Curating all series (timeout ${TIMEOUT}s per series, this takes hours)..."
$RUN curate --all --timeout "$TIMEOUT" $FORCE_FLAG || echo "Some curations failed (expected for large series). Continuing..."

echo ""
echo "Step 2/5: 4-eye audit..."
$RUN audit --all --timeout "$TIMEOUT" || echo "Some audits failed. Continuing..."

echo ""
echo "Step 3/5: Structural lint..."
$RUN_CORE lint --all || echo "Lint flagged issues. Review findings above."

echo ""
echo "Step 4/5: Applying approved curations..."
$RUN_CORE apply --all

echo ""
echo "Step 5/5: Validating..."
$RUN_CORE validate

echo ""
echo "Done. Run 'mise run catalog-review' to see flagged/escalated items."
"""

[tasks.catalog-pipeline-one]
description = "Run curate → audit → lint → apply on a single series"
run = """
#!/usr/bin/env bash
set -euo pipefail

SID="${1:-}"
if [ -z "$SID" ]; then
  echo "usage: mise run catalog-pipeline-one -- <series_id>"
  echo "   Set TIMEOUT env var to override per-step timeout (default 7200s):"
  echo "   TIMEOUT=3600 mise run catalog-pipeline-one -- <series_id>"
  exit 64
fi

TIMEOUT="${TIMEOUT:-7200}"

AI_DEPS="--extra ai"
RUN="uv run --directory tools $AI_DEPS lauschi-catalog"
RUN_CORE="uv run --directory tools lauschi-catalog"

LOGDIR="logs/catalog"
mkdir -p "$LOGDIR"
TIMESTAMP=$(date +%Y%m%d-%H%M%S)
LOG="$LOGDIR/one-${SID}-${TIMESTAMP}.log"
echo "Logging to $LOG"
exec > >(tee -a "$LOG") 2>&1

echo "Step 1/4: Curating $SID (timeout ${TIMEOUT}s)..."
$RUN curate "$SID" --timeout "$TIMEOUT" --force

echo ""
echo "Step 2/4: 4-eye audit (timeout ${TIMEOUT}s)..."
$RUN audit -s "$SID" --timeout "$TIMEOUT" --force

echo ""
echo "Step 3/4: Structural lint..."
$RUN_CORE lint -- "$SID"

echo ""
echo "Step 4/4: Checking audit status..."
STATUS=$(python3 -c "
import json, sys
from pathlib import Path
path = Path('assets/catalog/curation') / f'{sys.argv[1]}.json'
if not path.exists():
    print('missing')
    sys.exit(0)
data = json.loads(path.read_text())
print(data.get('review', {}).get('status', 'curated'))
" "$SID")

if [ "$STATUS" = "escalated" ]; then
    echo ""
    echo "⚠️  Audit escalated $SID. Apply skipped."
    echo "   Resolve via: mise run catalog-review -- $SID"
    echo "   Or force:    mise run catalog-apply -- $SID --force"
    echo ""
    exit 1
fi

echo ""
echo "Applying ($STATUS)..."
$RUN_CORE apply "$SID"

echo ""
echo "Done. Run 'mise run catalog-log-summary -- \\"\\$LOG\\" --detail $SID' to inspect."
"""

[tasks.tag-release]
description = "Bump calver version, commit, tag, and push"
run = "uvx bumpver update"

[tasks.coverage]
description = "Run tests with coverage and print summary"
run = """
flutter test --coverage --dart-define-from-file=.env.app
dart run tool/coverage_summary.dart
"""

[tasks.test-integration]
description = "Run integration tests on connected device via Patrol"
run = """
#!/usr/bin/env bash
TEST_TARGET="${1:-integration_test/}"

echo "Running integration tests: $TEST_TARGET"
adb shell media volume --set 0 2>/dev/null || echo "Warning: could not mute audio"

export PATH="$HOME/.pub-cache/bin:$PATH"

# Build a merged env file: start from .env.app, overlay provider settings
# from .env so cross-provider integration tests can authenticate.
# This mirrors `mise run dev` which also enables all providers.
#
# `set_env` upserts a key=value line. Implementation: delete any
# existing line for the key, then append the new value. Avoids the
# fragile sed s/// pattern which would mishandle special characters
# (pipes, ampersands, slashes, backslashes) in either key or value.
set_env() {
  local file="$1" key="$2" value="$3"
  local tmp
  tmp=$(mktemp)
  grep -v "^$key=" "$file" > "$tmp" 2>/dev/null || true
  echo "$key=$value" >> "$tmp"
  mv "$tmp" "$file"
}

ENV_TEST=$(mktemp)
cp .env.app "$ENV_TEST"
SPOTIFY_CLIENT_ID=$(grep SPOTIFY_CLIENT_ID .env 2>/dev/null | cut -d= -f2-)
set_env "$ENV_TEST" ENABLE_SPOTIFY true
set_env "$ENV_TEST" SPOTIFY_CLIENT_ID "$SPOTIFY_CLIENT_ID"
set_env "$ENV_TEST" ENABLE_APPLE_MUSIC true

# --no-uninstall preserves FlutterSecureStorage tokens from the debug app.
# Run `mise run dev` and authenticate Spotify/Apple Music before first run.
patrol test --no-uninstall -t "$TEST_TARGET" --dart-define-from-file="$ENV_TEST"
rm -f "$ENV_TEST"
"""

[tasks.ios-install]
description = "Install ad-hoc IPA on USB-connected iPad via pymobiledevice3"
run = """
#!/usr/bin/env bash
set -euo pipefail
IPA="${1:-}"
if [ -z "$IPA" ]; then
  echo "Usage: mise run ios-install <path-to-ipa>"
  echo ""
  echo "Download the IPA from Codemagic artifacts, then:"
  echo "  mise run ios-install ~/Downloads/lauschi.ipa"
  exit 1
fi
echo "Connected devices:"
pymobiledevice3 usbmux list --no-color 2>/dev/null | grep -E 'DeviceName|UniqueDeviceID' || idevice_id -l
echo ""
echo "Installing $IPA..."
pymobiledevice3 apps install "$IPA"
echo "Done."
"""

# ── Catalog web UI ─────────────────────────────────────────────────

[tasks.catalog-web]
description = "Run the catalog web UI (launches lauschi-catalog web)"
run = "uv run --directory tools --extra web lauschi-catalog web"

# Start the web UI: uv run --directory tools --extra web lauschi-catalog web --port 8009 --no-reload

[tasks.catalog-web-format]
description = "Auto-format all catalog-web source files (Python, Jinja, JS, CSS)"
run = """
cd tools
uv run ruff format src/lauschi_catalog/web
uv run djlint --reformat src/lauschi_catalog/web/templates
cd src/lauschi_catalog/web/static
biome format --write styles.css
"""

[tasks.catalog-web-check]
description = "Full catalog-web QA: ruff, biome, djlint"
run = """
cd tools
uv run ruff check src/lauschi_catalog/web
uv run ruff format --check src/lauschi_catalog/web
biome check src/lauschi_catalog/web/static/styles.css
uv run djlint --lint src/lauschi_catalog/web/templates
"""

# apple-music-discover replaced by catalog-discover.
