name: lauschi
description: "Kids audio player — a curated card-based interface around Spotify/Apple Music."
publish_to: 'none'
version: 2026.4.6+1

environment:
  sdk: ^3.7.0

dependencies:
  app_links: ^7.0.0
  audio_service: ^0.18.18
  # Pin to 0.2.x where AUDIO_SESSION_MICROPHONE defaults to 0 (disabled).
  # 0.1.x defaults to 1 (enabled), causing App Store rejection ITMS-90683.
  audio_session: ^0.2.2
  bcrypt: ^1.1.3
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  crypto: ^3.0.6
  dio: ^5.8.0+1
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.3
  go_router: ^17.1.0
  just_audio: ^0.10.5
  music_kit:
    path: packages/music_kit
  nfc_manager: ^4.1.1
  package_info_plus: ^10.0.0
  riverpod_annotation: ^4.0.2
  sentry_dio: ^9.14.0
  sentry_flutter: ^9.13.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  wakelock_plus: ^1.4.0
  webview_flutter: ^4.13.0
  webview_flutter_android: ^4.10.0
  webview_flutter_wkwebview: ^3.23.0
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.4.14
  drift_dev: ^2.32.1
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  patrol: ^4.2.0
  riverpod_generator: ^4.0.3
  sentry_dart_plugin: ^3.2.1
  test_api: any
  very_good_analysis: ^10.2.0
flutter:
  uses-material-design: true
  assets:
    - assets/player.html
    - assets/catalog/series.yaml
    - assets/catalog/ard_featured_shows.yaml
    - assets/images/branding/
    - assets/images/icons/
  fonts:
    - family: Nunito
      fonts:
        - asset: fonts/Nunito-Variable.ttf
        - asset: fonts/Nunito-Italic-Variable.ttf
          style: italic

# WORKAROUND: nfc_manager 4.1.1 passes null IntentFilter in
# registerReceiver, crashing on Android 14+. Local patch adds the
# ACTION_ADAPTER_STATE_CHANGED filter.
# See https://github.com/okadan/flutter-nfc-manager/issues/252
# Remove when upstream merges PR #260 and releases.
dependency_overrides:
  # WORKAROUND: riverpod_generator 4.0.3 pins analyzer ^9.0.0 but the
  # GitHub source already supports >=10.0.0 <13.0.0 (issue #4732).
  # drift_dev 2.32.1 requires analyzer >=10.0.0. Remove when
  # riverpod_generator publishes a new release.
  analyzer: ^10.0.0
  # WORKAROUND: dart_style 3.1.3 (transitive via build_runner) is
  # incompatible with analyzer 10+. Pin 3.1.7 which supports
  # >=10.0.0 <12.0.0. 3.1.8 requires analyzer ^12.0.0.
  dart_style: 3.1.7
  nfc_manager:
    path: packages/nfc_manager

patrol:
  app_name: lauschi
  test_directory: integration_test
  android:
    package_name: app.lauschi.lauschi

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: lauschi
  org: christopher-grebs
