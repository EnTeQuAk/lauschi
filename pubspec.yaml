name: lauschi
description: "Kids audio player — a curated card-based interface around Spotify/Apple Music."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.3
  crypto: ^3.0.6
  dio: ^5.8.0+1
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^14.8.1
  riverpod_annotation: ^2.6.1
  sentry_flutter: ^9.13.0
  sqlite3_flutter_libs: ^0.5.30
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  riverpod_generator: ^2.6.4
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/player.html
