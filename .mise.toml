[tools]
flutter = "3.41.1"
gh = "latest"
java = "temurin-17.0.18+8"

[env]
_.file = ".env"
JAVA_HOME = "{{env.HOME}}/.local/share/mise/installs/java/temurin-17.0.18+8"

[tasks.setup]
description = "Install deps, run codegen, verify analysis"
run = """
flutter pub get
dart run build_runner build --delete-conflicting-outputs
flutter analyze --fatal-infos
"""

[tasks.codegen]
description = "Run build_runner (Riverpod + Drift)"
run = "dart run build_runner build --delete-conflicting-outputs"

[tasks.watch]
description = "Run build_runner in watch mode"
run = "dart run build_runner watch --delete-conflicting-outputs"

[tasks.test]
description = "Run all tests"
run = "flutter test --dart-define-from-file=.env"

[tasks.dev]
description = "Run on connected device (extra args passed through)"
run = "flutter run --dart-define-from-file=.env"

[tasks.build]
description = "Build APK (runs codegen first)"
depends = ["codegen"]
run = "flutter build apk --dart-define-from-file=.env"

[tasks.check]
description = "Full CI check: format + analyze + test"
run = """
dart format --set-exit-if-changed .
flutter analyze --fatal-infos
flutter test --dart-define-from-file=.env
"""

[tasks.catalog-check]
description = "Validate series.yaml against live Spotify data (L1-L4)"
run = "uv run scripts/validate_catalog.py"

[tasks.catalog-check-fresh]
description = "Validate series.yaml — bypass cache, hit Spotify API directly"
run = "uv run scripts/validate_catalog.py --no-cache"

[tasks.catalog-audit]
description = "Full L5 artist-discography audit (fetches all albums per artist)"
run = "uv run scripts/validate_catalog.py --artist-audit"

[tasks.catalog-discover]
description = "Search Spotify for artist candidates for series without artist IDs"
run = "uv run scripts/validate_catalog.py --discover"
